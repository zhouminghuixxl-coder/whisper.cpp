name: Build Android Static Whisper

on: 
  workflow_dispatch: # 允许我们手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 克隆源码
        uses: actions/checkout@v4
        
      - name: 配置 Android NDK (翻译官)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          
      - name: 注入静态魔法并开始编译
        run: |
          cmake -B build-android -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-28 -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_SHARED_LIB=OFF
          cmake --build build-android --config Release -j 4
          
      - name: 打包战利品供下载
        uses: actions/upload-artifact@v4
        with:
          name: whisper-android-bin
          path: build-android/bin/
